<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order - Quick sushi - Sushi on Wheels</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="order.html">Order</a></li>
        </ul>
    </nav>
    <main>
        <h1>Place Your Order</h1>
        <p>Fill out the form below to place your order:</p>
        <form method="post" action="#">
            <!-- Customer Information Fields -->
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required>
            <!-- Order Details Fields -->
             <h2>Select Your Items</h2>
             <fieldset>
                <legend>Rolls</legend>
                <div>
                <label><input type="checkbox" name="item" value="California Roll"> California Roll - $8.99</label><br>
                <label for ="quantity">Quantity:</label>
                <select id="quantity" name="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                </div>
                <div>
                <label><input type="checkbox" name="item" value="Spicy Tuna Roll"> Spicy Tuna Roll - $12.99</label><br>
                <label for ="quantity">Quantity:</label>
                <select id="quantity" name="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                </div>
                 <div>
                <label><input type="checkbox" name="item" value="Vegetable Roll"> Vegetable Roll - $8.99</label><br>
                <label for ="quantity">Quantity:</label>
                <select id="quantity" name="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                </div>
                 <div>
                <label><input type="checkbox" name="item" value="Dragon Roll"> Dragon Roll - $14.99</label><br>
                <label for ="quantity">Quantity:</label>
                <select id="quantity" name="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                </div>
                 <div>
                <label><input type="checkbox" name="item" value="Rainbow Roll"> Rainbow Roll - $13.99</label><br>
                <label for ="quantity">Quantity:</label>
                <select id="quantity" name="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                </div>
             </fieldset>
             <fieldset>
                <legend>Side Dishes</legend>
                <div>
                <label><input type="checkbox" name="item" value="Miso Soup"> Miso Soup - $3.99</label><br>
                <label for ="quantity">Quantity:</label>
                <select id="quantity" name="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                </div>
                 <div>
                <label><input type="checkbox" name="item" value="Seaweed Salad"> Seaweed Salad - $5.99</label><br>
                <label for ="quantity">Quantity:</label>
                <select id="quantity" name="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                </div>
                 <div>
                <label><input type="checkbox" name="item" value="Gyoza"> Gyoza - $6.99</label><br>
                <label for ="quantity">Quantity:</label>
                <select id="quantity" name="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                </div>
                </fieldset>
            <fieldset>
                <legend>Drinks</legend>
                <div> 
                <label><input type="checkbox" name="item" value="Iced Green Tea"> Iced Green Tea - $5.99</label><br>
                <label for ="quantity">Quantity:</label>
                <select id="quantity" name="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                </div>
                 <div>
                <label><input type="checkbox" name="item" value="Japanese Beer"> Japanese Beer - $7.99</label><br>
                <label for ="quantity">Quantity:</label>
                <select id="quantity" name="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                </div>
                 <div>
                <label><input type="checkbox" name="item" value="Sake"> Sake - $6.99</label><br>
                <label for ="quantity">Quantity:</label>
                <select id="quantity" name="quantity">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                </div>
            </fieldset>
            <!-- Special Instructions -->
             <h2>Special Instructions</h2>
            <label for="instructions">Special Instructions:</label>
            <textarea id="instructions" name="instructions" rows="4" cols="50" placeholder="Any dietary restrictions or special requests?"></textarea>
            <!-- PICKUP TIME-->
             <h2>Pickup Time</h2>
            <label for="pickup">Select Pickup Time:</label>
            <input type="datetime-local" id="pickup" name="pickup" min="11:00" max="22:00" required>
            <!-- Submit Button -->
            <button type="submit">Place Order</button>
            <button type="reset">Reset Form</button>

        </form>
    </main>

    <footer>
        <p>&copy; 2026 Quick Sushi. All rights reserved.</p>
    </footer>
</body>
</html>
